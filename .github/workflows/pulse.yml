name: Pulse Embed
on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch: {}

concurrency:
  group: pulse-embed
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python pulse_update.py
      - name: Commit as owner
        run: |
          git config user.name "sm-ard"
          git config user.email "satishkumar.marada@gmail.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh pulse line $(date -u +%F)"
            git push
          fi
